<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data Processing Agreement Changelog · Dolphin Digital Group</title>
  <meta name="description" content="Data Processing Agreement between Dolphin Digital Group and its Processors." />
  <link rel="icon" href="./DDG-Legal-Favicon.png" />
  <style>
    :root{
      --bg:#0b0c0f; --panel:#12141a; --muted:#8b93a5; --text:#e9edf5;
      --accent:#238779; --accent-2:#ff8700; --border:#202534;
      --radius-xl:1.25rem; --radius-lg:1rem; --shadow: 0 10px 30px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.25);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Helvetica,Arial;
      background: radial-gradient(1200px 800px at 80% -10%, rgba(35,135,121,.25), transparent 60%),
                  radial-gradient(900px 600px at 10% -20%, rgba(255,135,0,.14), transparent 50%),
                  var(--bg);
      color:var(--text); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }
    header{position:sticky; top:0; z-index:10; backdrop-filter: blur(8px);
      background: linear-gradient(to bottom, rgba(11,12,15,.9), rgba(11,12,15,.65));
      border-bottom:1px solid var(--border);
    }
    .wrap{max-width:1100px; margin-inline:auto; padding:22px;}
    .brand{display:flex; align-items:center; gap:14px;}
    .logo{width:44px; height:44px; display:grid; place-items:center; border-radius:16px;
      background: conic-gradient(from 140deg, var(--accent), var(--accent-2)); box-shadow:var(--shadow);}
    main{padding:28px 20px 60px}
    article{background: linear-gradient(180deg,#12141a,#0f1217); border:1px solid var(--border); border-radius:16px; padding:22px; box-shadow:var(--shadow);}
    h1{margin:0 0 6px; font-size:20px}
    .muted{color:var(--muted); margin-bottom:18px}
    section{margin:18px 0}
    h2{margin:0 0 8px; font-size:16px}
    p, ul { color:var(--text); line-height:1.5; margin:8px 0}
    ul{margin-left:20px}
    .meta-row{display:flex; gap:12px; align-items:center; flex-wrap:wrap; color:var(--muted); font-size:13px}
    .signature{margin-top:22px; padding-top:16px; border-top:1px solid var(--border); display:flex; gap:28px; flex-wrap:wrap}
    .sig-block{min-width:220px}
    footer{border-top:1px solid var(--border); background:#0b0e12; color:var(--muted); padding:18px 22px; margin-top:28px}
    .note{font-size:13px; color:var(--muted)}
    @media print{ body{background:#fff; color:#000} article{border-color:#ccc; box-shadow:none} header, footer {display:none} }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 13c2.5-6.5 11-9 16-6.5-1.5 2-4.5 3-7.5 3.5 3 1 5 3 5 5.5 0 3-3 5.5-7.5 5.5C6.5 21.5 3 18 3 14c0-1 .3-1.8 1-3z" fill="white"/>
          </svg>
        </div>
        <div>
          <strong>Dolphin Digital Group · Legal</strong>
          <div class="muted">Data Processing Agreement (DPA)</div>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <article>
      <h1>Data Processing Agreement (DPA)</h1>
      <div class="meta-row">
        <div class="muted">Version: 0.1</div>
        <div class="muted">Last updated: 6 September 2025</div>
        <div class="muted"><a href="./">Visit</a></div>
      </div>
  </main>

  <footer>
    <div class="wrap" style="display:flex; justify-content:space-between; gap:18px; align-items:center;">
      <div class="muted">© <span id="year"></span> Dolphin Digital Group. This page is for informational purposes only.</div>
      <div class="muted">Legal Ops · <a href="mailto:legal@dolphinnetwork.ie" style="color:inherit; text-decoration:underline">legal@dolphinnetwork.ie</a></div>
    </div>
  </footer>

  <script>
    // small helper: set year
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>

</html>
